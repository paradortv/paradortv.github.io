<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Artesanías</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background-color: #2b2b2b;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: calc(14px + 0.8vmin);
            color: #f5e6d3;
        }
        .overlay {
            width: 100%;
            height: 100vh;
            background-color: rgba(20, 15, 10, 0.65);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2vw;
        }
        .main-container {
            display: flex;
            flex-direction: column;
            width: 92%;
            max-width: 1400px;
            height: 100%;
        }
        .gallery-container {
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
            position: relative;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 2px rgba(180, 140, 100, 0.3);
        }
        .gallery-track {
            display: flex;
            height: 100%;
            transition: transform 0.4s ease-out;
            will-change: transform;
        }
        .slide {
            flex: 0 0 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
            background-color: #1a1a1a;
        }
        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .clock-container {
            flex-shrink: 0;
            text-align: center;
            padding: 1vh 0 0.5vh;
            color: #eed9b2;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7), 0 0 10px rgba(180, 130, 70, 0.5);
            letter-spacing: 2px;
        }
        .clock-separator {
            width: 80%;
            max-width: 400px;
            height: 2px;
            background: linear-gradient(to right, transparent, #b89470, transparent);
            margin: 0 auto 0.5vh;
            opacity: 0.7;
        }
        .clock-time {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: bold;
            line-height: 1;
            margin-bottom: 2px;
        }
        .clock-date {
            font-size: clamp(1.4rem, 2.8vw, 2.3rem);
            font-weight: normal;
            opacity: 0.9;
            text-transform: lowercase;
        }
        .clock-date::first-letter { text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="main-container">
            <div class="gallery-container" id="galleryContainer">
                <div class="gallery-track" id="galleryTrack"></div>
            </div>
            <div class="clock-container">
                <div class="clock-separator"></div>
                <div class="clock-time" id="clockTime">--:--:--</div>
                <div class="clock-date" id="clockDate">Cargando fecha...</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var MAX_IMAGES = 20;
            var TRANS_DUR = 400;
            var DURACION_PRIMERA = 10000;   // 10 segundos para la imagen 1
            var DURACION_OTRAS = 3000;      // 3 segundos para el resto

            var track = document.getElementById('galleryTrack');
            var body = document.body;
            var clockTimeEl = document.getElementById('clockTime');
            var clockDateEl = document.getElementById('clockDate');

            var imageNumbers = [];          // Números de las imágenes existentes (ej: 1, 2, 5...)
            var currentIdx = 0;             // Índice actual en imageNumbers
            var isTransitioning = false;
            var autoTimer = null;

            // Los 3 slides fijos y sus imágenes
            var slideLeft, slideCenter, slideRight;
            var imgLeft, imgCenter, imgRight;

            var DIAS = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
            var MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

            // ---------- FONDO ----------
            function cargarFondo() {
                var img = new Image();
                img.onload = function() {
                    body.style.backgroundImage = "url('recursos/fondo.jpeg?v=" + Date.now() + "')";
                };
                img.onerror = function() {
                    body.style.backgroundColor = '#1f1a15';
                };
                img.src = 'recursos/fondo.jpeg?v=' + Date.now();
            }

            // ---------- CARGA DE IMÁGENES (con reintentos) ----------
            function cargarImagenes(callback) {
                var encontradas = [];
                var pendientes = MAX_IMAGES;

                function comprobar(num, intentos) {
                    if (num > pendientes) {
                        callback(encontradas);
                        return;
                    }
                    var url = 'img/' + num + '.jpeg?v=' + Date.now();
                    var img = new Image();
                    img.onload = function() {
                        encontradas.push(num);
                        comprobar(num + 1, 2);
                    };
                    img.onerror = function() {
                        if (intentos > 1) {
                            setTimeout(function() { comprobar(num, intentos - 1); }, 400);
                        } else {
                            comprobar(num + 1, 2);
                        }
                    };
                    img.src = url;
                }
                comprobar(1, 2);
            }

            // ---------- ACTUALIZAR LOS SRC (sin parpadeo, porque se usa después de precargar) ----------
            function refrescarSlides() {
                if (imageNumbers.length <= 1) return;

                var prevIdx = (currentIdx - 1 + imageNumbers.length) % imageNumbers.length;
                var nextIdx = (currentIdx + 1) % imageNumbers.length;
                var ahora = Date.now();

                // Solo cambiamos los src, los elementos img ya existen
                imgLeft.src = 'img/' + imageNumbers[prevIdx] + '.jpeg?v=' + ahora;
                imgCenter.src = 'img/' + imageNumbers[currentIdx] + '.jpeg?v=' + ahora;
                imgRight.src = 'img/' + imageNumbers[nextIdx] + '.jpeg?v=' + ahora;

                track.style.transition = 'none';
                track.style.transform = 'translate3d(-100%, 0, 0)';
            }

            // ---------- CONSTRUCCIÓN INICIAL ----------
            function construirGaleria(nums) {
                imageNumbers = nums;
                var total = nums.length;
                track.innerHTML = '';
                clearTimeout(autoTimer);
                isTransitioning = false;

                if (total === 0) {
                    var slide = document.createElement('div');
                    slide.className = 'slide';
                    slide.style.flex = '0 0 100%';
                    slide.style.color = '#eed9b2';
                    slide.style.fontSize = '2.5rem';
                    slide.textContent = 'Próximamente...';
                    track.appendChild(slide);
                    imgLeft = imgCenter = imgRight = null;
                    currentIdx = 0;
                    return;
                }

                // Crear los tres slides con sus imágenes fijas
                slideLeft = document.createElement('div'); slideLeft.className = 'slide';
                slideCenter = document.createElement('div'); slideCenter.className = 'slide';
                slideRight = document.createElement('div'); slideRight.className = 'slide';

                imgLeft = document.createElement('img'); imgLeft.draggable = false;
                imgCenter = document.createElement('img'); imgCenter.draggable = false;
                imgRight = document.createElement('img'); imgRight.draggable = false;

                slideLeft.appendChild(imgLeft);
                slideCenter.appendChild(imgCenter);
                slideRight.appendChild(imgRight);

                track.appendChild(slideLeft);
                track.appendChild(slideCenter);
                track.appendChild(slideRight);

                if (total === 1) {
                    imgCenter.src = 'img/' + nums[0] + '.jpeg?v=' + Date.now();
                    slideLeft.style.display = 'none';
                    slideRight.style.display = 'none';
                    slideCenter.style.flex = '0 0 100%';
                    imgLeft = imgCenter;
                    imgRight = imgCenter;
                    currentIdx = 0;
                    return;
                }

                // Posicionar en la primera imagen real
                track.style.transform = 'translate3d(-100%, 0, 0)';
                currentIdx = 0;
                refrescarSlides();        // Carga inicial de los 3 slides
                programarSiguiente();
            }

            // ---------- PRECARGA Y TRANSICIÓN ----------
            function precargarYTransitar(direccion) {
                if (isTransitioning || imageNumbers.length <= 1) return;
                isTransitioning = true;
                clearTimeout(autoTimer);

                var total = imageNumbers.length;
                var destinoIdx;
                if (direccion === 'next') {
                    destinoIdx = (currentIdx + 1) % total;
                } else {
                    destinoIdx = (currentIdx - 1 + total) % total;
                }

                // Precargar la imagen destino
                var urlPrecarga = 'img/' + imageNumbers[destinoIdx] + '.jpeg?v=' + Date.now();
                var precarga = new Image();
                precarga.onload = function() {
                    ejecutarTransicion(destinoIdx, direccion);
                };
                precarga.onerror = function() {
                    // Aunque falle, intentamos la transición
                    ejecutarTransicion(destinoIdx, direccion);
                };
                precarga.src = urlPrecarga;
            }

            function ejecutarTransicion(destinoIdx, direccion) {
                currentIdx = destinoIdx;

                if (direccion === 'next') {
                    track.style.transition = 'transform ' + (TRANS_DUR / 1000) + 's ease-out';
                    track.style.transform = 'translate3d(-200%, 0, 0)';
                } else {
                    track.style.transition = 'transform ' + (TRANS_DUR / 1000) + 's ease-out';
                    track.style.transform = 'translate3d(0, 0, 0)';
                }

                setTimeout(function() {
                    // Actualizar los otros slides (izquierda y derecha) y reposicionar
                    refrescarSlides();
                    isTransitioning = false;
                    programarSiguiente();
                }, TRANS_DUR);
            }

            // ---------- CONTROL DE TIEMPOS ----------
            function obtenerDuracion() {
                // Solo la imagen cuyo número es 1 recibe 10s
                return (imageNumbers[currentIdx] === 1) ? DURACION_PRIMERA : DURACION_OTRAS;
            }

            function programarSiguiente() {
                clearTimeout(autoTimer);
                if (imageNumbers.length <= 1) return;
                autoTimer = setTimeout(function() {
                    precargarYTransitar('next');
                }, obtenerDuracion());
            }

            // ---------- RELOJ ----------
            function actualizarReloj() {
                var ahora = new Date();
                var h = ahora.getHours();
                var m = ahora.getMinutes();
                var s = ahora.getSeconds();
                clockTimeEl.textContent = (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
                var dia = DIAS[ahora.getDay()];
                var mes = MESES[ahora.getMonth()];
                clockDateEl.textContent = dia + ', ' + ahora.getDate() + ' de ' + mes + ' de ' + ahora.getFullYear();
            }
            actualizarReloj();
            setInterval(actualizarReloj, 1000);

            // ---------- ARRANQUE ----------
            cargarFondo();
            cargarImagenes(function(nums) {
                construirGaleria(nums);
            });
        })();
    </script>
</body>
</html>
