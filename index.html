<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galería de productos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #222;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: calc(14px + 0.8vmin);
        }

        .overlay {
            width: 100%;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.55);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4vw;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 1400px;
            height: 100%;
        }

        .gallery-container {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            touch-action: none;
            position: relative;
            border-radius: 12px;
            background-color: rgba(0, 0, 0, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            user-select: none;
        }

        .gallery-track {
            display: flex;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1.0);
            will-change: transform;
        }

        .slide {
            flex: 0 0 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            pointer-events: none;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Contenedor del reloj */
        .clock-container {
            flex-shrink: 0;
            text-align: center;
            padding: 2vh 0 1vh;
            color: #f5e6d3;               /* Tono cálido pergamino */
            font-family: 'Georgia', 'Times New Roman', serif;  /* Rústico con remates */
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7), 0 0 15px rgba(200, 150, 80, 0.5);
            letter-spacing: 2px;
        }

        /* Hora principal grande */
        .clock-time {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: bold;
            line-height: 1.1;
            margin-bottom: 5px;
        }

        /* Fecha secundaria un poco más pequeña */
        .clock-date {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: normal;
            opacity: 0.9;
            text-transform: capitalize;
        }

        /* Segundos con estilo ligeramente diferente */
        .clock-seconds {
            font-size: 0.7em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="main-container">
            <div class="gallery-container" id="galleryContainer">
                <div class="gallery-track" id="galleryTrack"></div>
            </div>

            <!-- Aquí va el reloj -->
            <div class="clock-container" id="clockContainer">
                <div class="clock-time" id="clockTime">--:--:--</div>
                <div class="clock-date" id="clockDate">Cargando fecha...</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- CONFIGURACIÓN ----------
            var MAX_IMAGES = 20;
            var AUTOPLAY_INTERVAL = 5000;
            var TRANSITION_DURATION = 600;

            var track = document.getElementById('galleryTrack');
            var container = document.getElementById('galleryContainer');
            var body = document.body;

            // Elementos del reloj
            var clockTimeEl = document.getElementById('clockTime');
            var clockDateEl = document.getElementById('clockDate');

            var originalImages = [];
            var originalCount = 0;
            var slides = [];
            var currentIndex = 0;
            var autoTimer = null;
            var isDragging = false;
            var isTransitioning = false;
            var startPosX = 0;
            var startOffset = 0;
            var lastMoveX;

            // ---------- NOMBRES EN ESPAÑOL (compatibles con cualquier navegador) ----------
            var DIAS_SEMANA = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];
            var MESES = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];

            // ---------- CARGA DEL FONDO ----------
            function loadBackground() {
                var bgImg = new Image();
                bgImg.onload = function() {
                    body.style.backgroundImage = "url('recursos/fondo.jpeg')";
                };
                bgImg.onerror = function() {
                    body.style.backgroundColor = '#111';
                };
                bgImg.src = 'recursos/fondo.jpeg';
            }

            // ---------- CARGA DE IMÁGENES DE LA GALERÍA ----------
            function loadImages(callback) {
                var validUrls = [];
                var totalToCheck = MAX_IMAGES;

                function checkOne(index) {
                    if (index > totalToCheck) {
                        callback(validUrls);
                        return;
                    }
                    var url = 'img/' + index + '.jpeg';
                    var img = new Image();
                    img.onload = function() {
                        validUrls.push(url);
                        checkOne(index + 1);
                    };
                    img.onerror = function() {
                        checkOne(index + 1);
                    };
                    img.src = url;
                }
                checkOne(1);
            }

            function createSlide(imageUrl) {
                var slideDiv = document.createElement('div');
                slideDiv.className = 'slide';
                var img = document.createElement('img');
                img.src = imageUrl;
                img.alt = 'Producto';
                img.draggable = false;
                slideDiv.appendChild(img);
                return slideDiv;
            }

            function buildGallery(images) {
                track.innerHTML = '';
                originalImages = images;
                originalCount = images.length;

                if (originalCount === 0) {
                    var slide = document.createElement('div');
                    slide.className = 'slide';
                    slide.style.color = 'white';
                    slide.style.fontSize = '2.5rem';
                    slide.textContent = 'No hay imágenes disponibles';
                    track.appendChild(slide);
                    originalCount = 1;
                    slides = [slide];
                    currentIndex = 0;
                    return;
                }

                var fragment = document.createDocumentFragment();

                if (originalCount > 1) {
                    fragment.appendChild(createSlide(images[originalCount - 1]));
                }

                for (var i = 0; i < originalCount; i++) {
                    fragment.appendChild(createSlide(images[i]));
                }

                if (originalCount > 1) {
                    fragment.appendChild(createSlide(images[0]));
                }

                track.appendChild(fragment);
                slides = Array.prototype.slice.call(track.children);

                currentIndex = originalCount > 1 ? 1 : 0;
                updateTransform(false);
            }

            function updateTransform(withTransition) {
                if (withTransition === undefined) withTransition = true;
                track.style.transition = withTransition ? 'transform ' + (TRANSITION_DURATION / 1000) + 's cubic-bezier(0.25, 0.1, 0.25, 1.0)' : 'none';
                track.style.transform = 'translateX(-' + (currentIndex * 100) + '%)';
            }

            function resetAutoTimer() {
                clearInterval(autoTimer);
                if (originalCount > 1) {
                    autoTimer = setInterval(autoNext, AUTOPLAY_INTERVAL);
                }
            }

            function autoNext() {
                if (isDragging || isTransitioning || originalCount <= 1) return;
                isTransitioning = true;
                currentIndex++;
                updateTransform(true);
                setTimeout(handleTransitionEnd, TRANSITION_DURATION + 50);
            }

            function handleTransitionEnd() {
                isTransitioning = false;
                if (originalCount <= 1) return;
                if (currentIndex === 0) {
                    currentIndex = originalCount;
                    updateTransform(false);
                } else if (currentIndex === slides.length - 1) {
                    currentIndex = 1;
                    updateTransform(false);
                }
            }

            function getCurrentOffset() {
                return -currentIndex * container.offsetWidth;
            }

            // ---------- RELOJ DIGITAL ----------
            function updateClock() {
                var ahora = new Date();

                // Hora con dos dígitos
                var horas = ahora.getHours();
                var minutos = ahora.getMinutes();
                var segundos = ahora.getSeconds();

                var strHoras = (horas < 10 ? '0' : '') + horas;
                var strMinutos = (minutos < 10 ? '0' : '') + minutos;
                var strSegundos = (segundos < 10 ? '0' : '') + segundos;

                // Mostrar hora: HH:MM:SS
                clockTimeEl.innerHTML = strHoras + ':' + strMinutos + ':' + strSegundos;

                // Fecha
                var diaSemana = DIAS_SEMANA[ahora.getDay()];
                var diaMes = ahora.getDate();
                var mes = MESES[ahora.getMonth()];
                var anio = ahora.getFullYear();

                clockDateEl.textContent = diaSemana + ', ' + diaMes + ' de ' + mes + ' de ' + anio;
            }

            // Actualizar el reloj inmediatamente y luego cada segundo
            updateClock();
            setInterval(updateClock, 1000);

            // ---------- EVENTOS DE RATÓN ----------
            container.addEventListener('mousedown', function(e) {
                startDrag(e.clientX);
                e.preventDefault();
            });
            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                moveDrag(e.clientX);
                e.preventDefault();
            });
            window.addEventListener('mouseup', function(e) {
                if (!isDragging) return;
                endDrag(e.clientX);
                e.preventDefault();
            });

            // ---------- EVENTOS TÁCTILES ----------
            container.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1) {
                    startDrag(e.touches[0].clientX);
                    e.preventDefault();
                }
            });
            container.addEventListener('touchmove', function(e) {
                if (!isDragging) return;
                moveDrag(e.touches[0].clientX);
                e.preventDefault();
            });
            container.addEventListener('touchend', function(e) {
                if (!isDragging) return;
                endDrag(lastMoveX !== undefined ? lastMoveX : startPosX);
                e.preventDefault();
            });

            function startDrag(clientX) {
                if (originalCount <= 1) return;
                clearInterval(autoTimer);
                isDragging = true;
                lastMoveX = clientX;
                track.style.transition = 'none';
                startOffset = getCurrentOffset();
                startPosX = clientX;
            }

            function moveDrag(clientX) {
                if (!isDragging) return;
                lastMoveX = clientX;
                var diffX = clientX - startPosX;
                var newOffset = startOffset + diffX;
                track.style.transform = 'translateX(' + newOffset + 'px)';
            }

            function endDrag(clientX) {
                if (!isDragging) return;
                isDragging = false;
                lastMoveX = undefined;

                var diffX = clientX - startPosX;
                var endOffset = startOffset + diffX;
                var containerWidth = container.offsetWidth;

                var targetIndex = Math.round(-endOffset / containerWidth);
                targetIndex = Math.max(0, Math.min(targetIndex, slides.length - 1));

                isTransitioning = true;
                currentIndex = targetIndex;
                updateTransform(true);

                setTimeout(handleTransitionEnd, TRANSITION_DURATION + 50);
                resetAutoTimer();
            }

            // ---------- INICIALIZACIÓN ----------
            loadBackground();

            loadImages(function(images) {
                buildGallery(images);
                if (originalCount > 1) {
                    resetAutoTimer();
                }
            });
        })();
    </script>
</body>
</html>
