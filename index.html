<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Artesanías | Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2b2b2b;            /* Respaldo oscuro */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: calc(14px + 0.8vmin);
            color: #f5e6d3;
        }

        .overlay {
            width: 100%;
            height: 100vh;
            background-color: rgba(20, 15, 10, 0.65);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2vw;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            width: 92%;
            max-width: 1400px;
            height: 100%;
        }

        /* Contenedor del video (mismo lugar que la galería) */
        .video-container {
            flex: 1 1 auto;
            min-height: 0;
            border-radius: 8px;
            background-color: #1a1a1a;
            box-shadow: 0 0 2px rgba(180, 140, 100, 0.3);
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;       /* Se adapta sin recortes (bandas negras si no es 16:9 exacto) */
            background: #1a1a1a;       /* Color de las bandas */
        }

        /* Reloj (idéntico al diseño anterior) */
        .clock-container {
            flex-shrink: 0;
            text-align: center;
            padding: 1vh 0 0.5vh;
            color: #eed9b2;
            text-shadow:
                1px 1px 3px rgba(0,0,0,0.7),
                0 0 10px rgba(180, 130, 70, 0.5);
            letter-spacing: 2px;
        }

        .clock-separator {
            width: 80%;
            max-width: 400px;
            height: 2px;
            background: linear-gradient(to right, transparent, #b89470, transparent);
            margin: 0 auto 0.5vh;
            opacity: 0.7;
        }

        .clock-time {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: bold;
            line-height: 1;
            margin-bottom: 2px;
        }

        .clock-date {
            font-size: clamp(1.4rem, 2.8vw, 2.3rem);
            font-weight: normal;
            opacity: 0.9;
            text-transform: lowercase;
        }

        .clock-date::first-letter {
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="main-container">
            <!-- VIDEO -->
            <div class="video-container">
                <video id="promoVideo" autoplay loop muted playsinline preload="auto">
                    <source src="img/video.mp4" type="video/mp4">
                    <!-- Fallback por si el formato no es soportado -->
                    Tu televisor no puede reproducir este video.
                </video>
            </div>

            <!-- RELOJ -->
            <div class="clock-container">
                <div class="clock-separator"></div>
                <div class="clock-time" id="clockTime">--:--:--</div>
                <div class="clock-date" id="clockDate">Cargando fecha...</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var body = document.body;
            var clockTimeEl = document.getElementById('clockTime');
            var clockDateEl = document.getElementById('clockDate');

            // Nombres en español para el reloj (compatibles con navegadores antiguos)
            var DIAS = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];
            var MESES = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];

            // ---------- CARGA DEL FONDO (misma técnica compatible) ----------
            function cargarFondo() {
                var img = new Image();
                img.onload = function() {
                    body.style.backgroundImage = "url('recursos/fondo.jpeg?v=" + Date.now() + "')";
                };
                img.onerror = function() {
                    body.style.backgroundColor = '#1f1a15';   // Tono tierra si falla
                };
                img.src = 'recursos/fondo.jpeg?v=' + Date.now();
            }

            // ---------- RELOJ DIGITAL EXACTO ----------
            function actualizarReloj() {
                var ahora = new Date();
                var h = ahora.getHours();
                var m = ahora.getMinutes();
                var s = ahora.getSeconds();

                clockTimeEl.textContent =
                    (h < 10 ? '0' : '') + h + ':' +
                    (m < 10 ? '0' : '') + m + ':' +
                    (s < 10 ? '0' : '') + s;

                var dia = DIAS[ahora.getDay()];
                var mes = MESES[ahora.getMonth()];
                clockDateEl.textContent = dia + ', ' + ahora.getDate() + ' de ' + mes + ' de ' + ahora.getFullYear();
            }

            actualizarReloj();
            setInterval(actualizarReloj, 1000);

            // ---------- INICIO ----------
            cargarFondo();

            // Opcional: intentar reproducir el video por si el autoplay falla en algún TV muy restrictivo
            var video = document.getElementById('promoVideo');
            video.play().catch(function(err) {
                // Si falla, no hacemos nada (es raro con muted)
            });
        })();
    </script>
</body>
</html>
