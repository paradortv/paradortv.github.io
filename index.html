<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galería de productos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fondo base (respaldo) y fuente escalable para TV */
        body {
            background-color: #222;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Tamaño de letra base que crece con la pantalla */
            font-size: calc(14px + 0.8vmin);
        }

        /* Capa oscura con padding adaptable */
        .overlay {
            width: 100%;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.55);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4vw;                /* Margen de seguridad para TV */
        }

        /* Contenedor principal: columna flexible y ancha */
        .main-container {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 1400px;          /* Más ancho para TV */
            height: 100%;
        }

        /* Galería ocupa todo el espacio vertical sobrante */
        .gallery-container {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            touch-action: none;
            position: relative;
            border-radius: 12px;
            background-color: rgba(0, 0, 0, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            user-select: none;
        }

        /* Pista deslizable */
        .gallery-track {
            display: flex;
            height: 100%;
            transition: transform 0.3s ease;
            will-change: transform;
        }

        /* Cada diapositiva */
        .slide {
            flex: 0 0 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* Imágenes dentro de las diapositivas */
        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;       /* Se ve completa sin recortes */
            pointer-events: none;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Texto inferior con tamaño TV-friendly */
        .footer-text {
            flex-shrink: 0;
            text-align: center;
            padding: 2vh 0;
            color: white;
            /* Escala entre 2.5rem y 5rem dependiendo del ancho de pantalla */
            font-size: clamp(2.5rem, 5vw, 5rem);
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="main-container">
            <div class="gallery-container" id="galleryContainer">
                <div class="gallery-track" id="galleryTrack"></div>
            </div>
            <div class="footer-text">¡mira nuestros productos!</div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- CONFIGURACIÓN ----------
            var MAX_IMAGES = 20;
            var AUTOPLAY_INTERVAL = 5000;
            var TRANSITION_DURATION = 300;

            var track = document.getElementById('galleryTrack');
            var container = document.getElementById('galleryContainer');
            var body = document.body;

            var originalImages = [];
            var originalCount = 0;
            var slides = [];
            var currentIndex = 0;
            var autoTimer = null;
            var isDragging = false;
            var isTransitioning = false;
            var startPosX = 0;
            var startOffset = 0;
            var lastMoveX;

            // ---------- CARGA DEL FONDO POR JS ----------
            function loadBackground() {
                var bgImg = new Image();
                bgImg.onload = function() {
                    body.style.backgroundImage = "url('recursos/fondo.jpeg')";
                };
                bgImg.onerror = function() {
                    body.style.backgroundColor = '#111';
                };
                bgImg.src = 'recursos/fondo.jpeg';
            }

            // ---------- CARGA DE IMÁGENES DE LA GALERÍA ----------
            function loadImages(callback) {
                var validUrls = [];
                var totalToCheck = MAX_IMAGES;

                function checkOne(index) {
                    if (index > totalToCheck) {
                        callback(validUrls);
                        return;
                    }
                    var url = 'img/' + index + '.jpeg';
                    var img = new Image();
                    img.onload = function() {
                        validUrls.push(url);
                        checkOne(index + 1);
                    };
                    img.onerror = function() {
                        checkOne(index + 1);
                    };
                    img.src = url;
                }
                checkOne(1);
            }

            function createSlide(imageUrl) {
                var slideDiv = document.createElement('div');
                slideDiv.className = 'slide';
                var img = document.createElement('img');
                img.src = imageUrl;
                img.alt = 'Producto';
                img.draggable = false;
                slideDiv.appendChild(img);
                return slideDiv;
            }

            function buildGallery(images) {
                track.innerHTML = '';
                originalImages = images;
                originalCount = images.length;

                if (originalCount === 0) {
                    var slide = document.createElement('div');
                    slide.className = 'slide';
                    slide.style.color = 'white';
                    slide.style.fontSize = '2.5rem';   /* Tamaño grande también aquí */
                    slide.textContent = 'No hay imágenes disponibles';
                    track.appendChild(slide);
                    originalCount = 1;
                    slides = [slide];
                    currentIndex = 0;
                    return;
                }

                var fragment = document.createDocumentFragment();
                if (originalCount > 1) {
                    fragment.appendChild(createSlide(images[originalCount - 1]));
                }
                for (var i = 0; i < originalCount; i++) {
                    fragment.appendChild(createSlide(images[i]));
                }
                if (originalCount > 1) {
                    fragment.appendChild(createSlide(images[0]));
                }

                track.appendChild(fragment);
                slides = Array.prototype.slice.call(track.children);
                currentIndex = originalCount > 1 ? 1 : 0;
                updateTransform(false);
            }

            function updateTransform(withTransition) {
                if (withTransition === undefined) withTransition = true;
                track.style.transition = withTransition ? 'transform ' + (TRANSITION_DURATION / 1000) + 's ease' : 'none';
                track.style.transform = 'translateX(-' + (currentIndex * 100) + '%)';
            }

            function resetAutoTimer() {
                clearInterval(autoTimer);
                if (originalCount > 1) {
                    autoTimer = setInterval(autoNext, AUTOPLAY_INTERVAL);
                }
            }

            function autoNext() {
                if (isDragging || isTransitioning || originalCount <= 1) return;
                isTransitioning = true;
                currentIndex++;
                updateTransform(true);
                setTimeout(handleTransitionEnd, TRANSITION_DURATION + 50);
            }

            function handleTransitionEnd() {
                isTransitioning = false;
                if (originalCount <= 1) return;
                if (currentIndex === 0) {
                    currentIndex = originalCount;
                    updateTransform(false);
                } else if (currentIndex === slides.length - 1) {
                    currentIndex = 1;
                    updateTransform(false);
                }
            }

            function getCurrentOffset() {
                return -currentIndex * container.offsetWidth;
            }

            // ---------- EVENTOS DE RATÓN ----------
            container.addEventListener('mousedown', function(e) {
                startDrag(e.clientX);
                e.preventDefault();
            });
            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                moveDrag(e.clientX);
                e.preventDefault();
            });
            window.addEventListener('mouseup', function(e) {
                if (!isDragging) return;
                endDrag(e.clientX);
                e.preventDefault();
            });

            // ---------- EVENTOS TÁCTILES ----------
            container.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1) {
                    startDrag(e.touches[0].clientX);
                    e.preventDefault();
                }
            });
            container.addEventListener('touchmove', function(e) {
                if (!isDragging) return;
                moveDrag(e.touches[0].clientX);
                e.preventDefault();
            });
            container.addEventListener('touchend', function(e) {
                if (!isDragging) return;
                endDrag(lastMoveX !== undefined ? lastMoveX : startPosX);
                e.preventDefault();
            });

            function startDrag(clientX) {
                if (originalCount <= 1) return;
                clearInterval(autoTimer);
                isDragging = true;
                lastMoveX = clientX;
                track.style.transition = 'none';
                startOffset = getCurrentOffset();
                startPosX = clientX;
            }

            function moveDrag(clientX) {
                if (!isDragging) return;
                lastMoveX = clientX;
                var diffX = clientX - startPosX;
                var newOffset = startOffset + diffX;
                track.style.transform = 'translateX(' + newOffset + 'px)';
            }

            function endDrag(clientX) {
                if (!isDragging) return;
                isDragging = false;
                lastMoveX = undefined;

                var diffX = clientX - startPosX;
                var endOffset = startOffset + diffX;
                var containerWidth = container.offsetWidth;

                var targetIndex = Math.round(-endOffset / containerWidth);
                targetIndex = Math.max(0, Math.min(targetIndex, slides.length - 1));

                isTransitioning = true;
                currentIndex = targetIndex;
                updateTransform(true);

                setTimeout(handleTransitionEnd, TRANSITION_DURATION + 50);
                resetAutoTimer();
            }

            // ---------- INICIALIZACIÓN ----------
            loadBackground();

            loadImages(function(images) {
                buildGallery(images);
                if (originalCount > 1) {
                    resetAutoTimer();
                }
            });
        })();
    </script>
</body>
</html>
