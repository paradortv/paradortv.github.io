<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Artesanías | Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2b2b2b;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: calc(14px + 0.8vmin);
            color: #f5e6d3;
        }

        .overlay {
            width: 100%;
            height: 100vh;
            background-color: rgba(20, 15, 10, 0.65);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2vw;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            width: 92%;
            max-width: 1400px;
            height: 100%;
        }

        .video-container {
            flex: 1 1 auto;
            min-height: 0;
            border-radius: 8px;
            background-color: #1a1a1a;
            box-shadow: 0 0 2px rgba(180, 140, 100, 0.3);
            overflow: hidden;
            position: relative;
        }

        /* Imagen de respaldo (se muestra si el video no arranca) */
        .fallback-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #1a1a1a;
            display: block;               /* Visible por defecto */
            z-index: 2;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #1a1a1a;
            position: relative;
            z-index: 1;
        }

        .clock-container {
            flex-shrink: 0;
            text-align: center;
            padding: 1vh 0 0.5vh;
            color: #eed9b2;
            text-shadow:
                1px 1px 3px rgba(0,0,0,0.7),
                0 0 10px rgba(180, 130, 70, 0.5);
            letter-spacing: 2px;
        }

        .clock-separator {
            width: 80%;
            max-width: 400px;
            height: 2px;
            background: linear-gradient(to right, transparent, #b89470, transparent);
            margin: 0 auto 0.5vh;
            opacity: 0.7;
        }

        .clock-time {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: bold;
            line-height: 1;
            margin-bottom: 2px;
        }

        .clock-date {
            font-size: clamp(1.4rem, 2.8vw, 2.3rem);
            font-weight: normal;
            opacity: 0.9;
            text-transform: lowercase;
        }

        .clock-date::first-letter {
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="main-container">
            <div class="video-container" id="videoContainer">
                <!-- Imagen estática de respaldo (prioritaria) -->
                <img id="fallbackImg" class="fallback-image" src="img/poster.jpg" alt="Vista previa">
                <!-- Video (oculto debajo del poster mientras no esté reproduciéndose) -->
                <video id="promoVideo" autoplay loop muted playsinline preload="metadata"
                       poster="img/poster.jpg">
                    <source src="img/video.mp4" type="video/mp4">
                </video>
            </div>

            <div class="clock-container">
                <div class="clock-separator"></div>
                <div class="clock-time" id="clockTime">--:--:--</div>
                <div class="clock-date" id="clockDate">Cargando fecha...</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var body = document.body;
            var clockTimeEl = document.getElementById('clockTime');
            var clockDateEl = document.getElementById('clockDate');
            var video = document.getElementById('promoVideo');
            var fallbackImg = document.getElementById('fallbackImg');
            var videoContainer = document.getElementById('videoContainer');

            var DIAS = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];
            var MESES = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];

            // Estados
            var videoLoaded = false;
            var timeoutId = null;
            var retryInterval = 30000; // Reintentar cada 30 segundos si falló

            // ---------- CARGA DEL FONDO ----------
            function cargarFondo() {
                var img = new Image();
                img.onload = function() {
                    body.style.backgroundImage = "url('recursos/fondo.jpeg?v=" + Date.now() + "')";
                };
                img.onerror = function() {
                    body.style.backgroundColor = '#1f1a15';
                };
                img.src = 'recursos/fondo.jpeg?v=' + Date.now();
            }

            // ---------- RELOJ ----------
            function actualizarReloj() {
                var ahora = new Date();
                var h = ahora.getHours();
                var m = ahora.getMinutes();
                var s = ahora.getSeconds();
                clockTimeEl.textContent =
                    (h < 10 ? '0' : '') + h + ':' +
                    (m < 10 ? '0' : '') + m + ':' +
                    (s < 10 ? '0' : '') + s;

                var dia = DIAS[ahora.getDay()];
                var mes = MESES[ahora.getMonth()];
                clockDateEl.textContent = dia + ', ' + ahora.getDate() + ' de ' + mes + ' de ' + ahora.getFullYear();
            }
            actualizarReloj();
            setInterval(actualizarReloj, 1000);

            // ---------- LÓGICA DEL VIDEO ----------
            function mostrarPoster() {
                fallbackImg.style.display = 'block';
                video.style.display = 'none';      // Ocultamos el video para que no consuma recursos
            }

            function mostrarVideo() {
                fallbackImg.style.display = 'none';
                video.style.display = 'block';
                videoLoaded = true;
                if (timeoutId) clearTimeout(timeoutId);
            }

            function iniciarReproduccion() {
                video.play().then(function() {
                    // La reproducción comenzó
                    mostrarVideo();
                }).catch(function(err) {
                    // Error al reproducir (probablemente por falta de datos)
                    console.log('Reproducción fallida, esperando...');
                    // Esperamos un poco y reintentamos
                    setTimeout(function() {
                        if (!videoLoaded) video.play();
                    }, 1000);
                });
            }

            function cargarVideo() {
                // Reiniciar estado
                videoLoaded = false;
                video.currentTime = 0;
                video.pause();
                mostrarPoster();

                // Timeout de seguridad: si en 6 segundos no se reproduce, se queda con el poster
                timeoutId = setTimeout(function() {
                    if (!videoLoaded) {
                        console.log('Video no arrancó, mostrando fallback permanente');
                        mostrarPoster();
                        // Programar reintento en 30s
                        setTimeout(cargarVideo, retryInterval);
                    }
                }, 6000);

                // Forzar carga del video con fetch para evitar problemas de caché
                var url = 'img/video.mp4?v=' + Date.now();
                fetch(url, { mode: 'cors' })  // Intentamos con fetch; si falla (archivo local), el video src hará lo suyo
                    .then(function(response) {
                        if (response.ok) {
                            // Asignamos blob al video para un control más fino
                            return response.blob();
                        }
                        throw new Error('No se pudo descargar');
                    })
                    .then(function(blob) {
                        var blobUrl = URL.createObjectURL(blob);
                        video.src = blobUrl;
                        video.load();
                        iniciarReproduccion();
                    })
                    .catch(function() {
                        // Si fetch falla (muy probable en local), usamos la carga normal
                        console.log('Fetch no disponible, carga normal');
                        video.src = 'img/video.mp4?v=' + Date.now();
                        video.load();
                        iniciarReproduccion();
                    });
            }

            // Eventos nativos del video (por si fetch no se usó)
            video.addEventListener('playing', function() {
                mostrarVideo();
            });
            video.addEventListener('error', function() {
                if (!videoLoaded) {
                    clearTimeout(timeoutId);
                    mostrarPoster();
                    // Reintentar en 30 segundos
                    setTimeout(cargarVideo, retryInterval);
                }
            });

            // Iniciar la primera carga
            cargarFondo();
            cargarVideo();
        })();
    </script>
</body>
</html>
