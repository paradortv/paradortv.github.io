<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galería artesanal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2b2b2b;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: calc(14px + 0.8vmin);
            color: #f5e6d3;
        }

        .overlay {
            width: 100%;
            height: 100vh;
            background-color: rgba(20, 15, 10, 0.65);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2vw;               /* Márgenes reducidos */
        }

        .main-container {
            display: flex;
            flex-direction: column;
            width: 92%;
            max-width: 1400px;
            height: 100%;
        }

        /* Galería */
        .gallery-container {
            flex: 1 1 auto;             /* Ocupa todo el espacio disponible */
            min-height: 0;
            overflow: hidden;
            touch-action: none;
            position: relative;
            border-radius: 12px;
            background-color: rgba(0, 0, 0, 0.4);
            box-shadow:
                0 0 0 3px rgba(180, 140, 100, 0.3),
                0 20px 40px rgba(0, 0, 0, 0.6),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            user-select: none;
        }

        .gallery-track {
            display: flex;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1.0);
            will-change: transform;
        }

        .slide {
            flex: 0 0 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;                 /* Sin padding para aprovechar todo el espacio */
            background-color: #1a1a1a;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;        /* La imagen se muestra completa */
            border-radius: 6px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        /* Reloj compacto */
        .clock-container {
            flex-shrink: 0;
            text-align: center;
            padding: 1vh 0 0.5vh;
            color: #eed9b2;
            text-shadow:
                2px 2px 6px rgba(0, 0, 0, 0.7),
                0 0 15px rgba(180, 130, 70, 0.6);
            letter-spacing: 2px;
        }

        .clock-separator {
            width: 80%;
            max-width: 400px;
            height: 2px;
            background: linear-gradient(to right, transparent, #b89470, transparent);
            margin: 0 auto 0.5vh;
            opacity: 0.7;
        }

        .clock-time {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: bold;
            line-height: 1;
            margin-bottom: 2px;
        }

        .clock-date {
            font-size: clamp(1.4rem, 2.8vw, 2.3rem);
            font-weight: normal;
            opacity: 0.9;
            text-transform: lowercase;
        }

        .clock-date::first-letter {
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="main-container">
            <div class="gallery-container" id="galleryContainer">
                <div class="gallery-track" id="galleryTrack"></div>
            </div>

            <div class="clock-container" id="clockContainer">
                <div class="clock-separator"></div>
                <div class="clock-time" id="clockTime">--:--:--</div>
                <div class="clock-date" id="clockDate">Cargando fecha...</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var MAX_IMAGES = 20;
            var AUTOPLAY_INTERVAL = 5000;
            var TRANSITION_DURATION = 600;

            var track = document.getElementById('galleryTrack');
            var container = document.getElementById('galleryContainer');
            var body = document.body;

            var clockTimeEl = document.getElementById('clockTime');
            var clockDateEl = document.getElementById('clockDate');

            var originalImages = [];
            var originalCount = 0;
            var slides = [];
            var currentIndex = 0;
            var autoTimer = null;
            var isDragging = false;
            var isTransitioning = false;
            var startPosX = 0;
            var startOffset = 0;
            var lastMoveX;

            var DIAS = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];
            var MESES = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];

            function cargarFondo() {
                var img = new Image();
                img.onload = function() {
                    body.style.backgroundImage = "url('recursos/fondo.jpeg')";
                };
                img.onerror = function() {
                    body.style.backgroundColor = '#1f1a15';
                };
                img.src = 'recursos/fondo.jpeg';
            }

            function cargarImagenes(callback) {
                var validas = [];
                var pendientes = MAX_IMAGES;

                function verificar(indice) {
                    if (indice > pendientes) {
                        callback(validas);
                        return;
                    }
                    var url = 'img/' + indice + '.jpeg';
                    var img = new Image();
                    img.onload = function() {
                        validas.push(url);
                        verificar(indice + 1);
                    };
                    img.onerror = function() {
                        verificar(indice + 1);
                    };
                    img.src = url;
                }
                verificar(1);
            }

            function crearSlide(urlImagen) {
                var div = document.createElement('div');
                div.className = 'slide';
                var img = document.createElement('img');
                img.src = urlImagen;
                img.alt = 'Producto artesanal';
                img.draggable = false;
                div.appendChild(img);
                return div;
            }

            function construirGaleria(imagenes) {
                track.innerHTML = '';
                originalImages = imagenes;
                originalCount = imagenes.length;

                if (originalCount === 0) {
                    var slide = document.createElement('div');
                    slide.className = 'slide';
                    slide.style.color = '#eed9b2';
                    slide.style.fontSize = '2.5rem';
                    slide.textContent = 'Próximamente...';
                    track.appendChild(slide);
                    slides = [slide];
                    currentIndex = 0;
                    return;
                }

                var fragment = document.createDocumentFragment();

                if (originalCount > 1) {
                    fragment.appendChild(crearSlide(imagenes[originalCount - 1]));
                }
                for (var i = 0; i < originalCount; i++) {
                    fragment.appendChild(crearSlide(imagenes[i]));
                }
                if (originalCount > 1) {
                    fragment.appendChild(crearSlide(imagenes[0]));
                }

                track.appendChild(fragment);
                slides = Array.prototype.slice.call(track.children);
                currentIndex = originalCount > 1 ? 1 : 0;
                actualizarTransform(false);
            }

            function actualizarTransform(conTransicion) {
                if (conTransicion === undefined) conTransicion = true;
                track.style.transition = conTransicion ?
                    'transform ' + (TRANSITION_DURATION / 1000) + 's cubic-bezier(0.25, 0.1, 0.25, 1.0)' :
                    'none';
                track.style.transform = 'translateX(-' + (currentIndex * 100) + '%)';
            }

            function reiniciarAutoTimer() {
                clearInterval(autoTimer);
                if (originalCount > 1) {
                    autoTimer = setInterval(siguienteAuto, AUTOPLAY_INTERVAL);
                }
            }

            function siguienteAuto() {
                if (isDragging || isTransitioning || originalCount <= 1) return;
                isTransitioning = true;
                currentIndex++;
                actualizarTransform(true);
                setTimeout(manejarFinTransicion, TRANSITION_DURATION + 50);
            }

            function manejarFinTransicion() {
                isTransitioning = false;
                if (originalCount <= 1) return;
                if (currentIndex === 0) {
                    currentIndex = originalCount;
                    actualizarTransform(false);
                } else if (currentIndex === slides.length - 1) {
                    currentIndex = 1;
                    actualizarTransform(false);
                }
            }

            function obtenerOffsetActual() {
                return -currentIndex * container.offsetWidth;
            }

            function actualizarReloj() {
                var ahora = new Date();
                var h = ahora.getHours();
                var m = ahora.getMinutes();
                var s = ahora.getSeconds();
                clockTimeEl.textContent =
                    (h < 10 ? '0' : '') + h + ':' +
                    (m < 10 ? '0' : '') + m + ':' +
                    (s < 10 ? '0' : '') + s;

                var diaSemana = DIAS[ahora.getDay()];
                var diaMes = ahora.getDate();
                var mes = MESES[ahora.getMonth()];
                var anio = ahora.getFullYear();
                clockDateEl.textContent = diaSemana + ', ' + diaMes + ' de ' + mes + ' de ' + anio;
            }
            actualizarReloj();
            setInterval(actualizarReloj, 1000);

            container.addEventListener('mousedown', function(e) {
                e.preventDefault();
                iniciarArrastre(e.clientX);
            });
            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                e.preventDefault();
                moverArrastre(e.clientX);
            });
            window.addEventListener('mouseup', function(e) {
                if (!isDragging) return;
                e.preventDefault();
                finalizarArrastre(e.clientX);
            });

            container.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1) {
                    e.preventDefault();
                    iniciarArrastre(e.touches[0].clientX);
                }
            });
            container.addEventListener('touchmove', function(e) {
                if (!isDragging) return;
                e.preventDefault();
                moverArrastre(e.touches[0].clientX);
            });
            container.addEventListener('touchend', function(e) {
                if (!isDragging) return;
                e.preventDefault();
                var x = (lastMoveX !== undefined) ? lastMoveX : startPosX;
                finalizarArrastre(x);
            });

            function iniciarArrastre(clientX) {
                if (originalCount <= 1) return;
                clearInterval(autoTimer);
                isDragging = true;
                lastMoveX = clientX;
                track.style.transition = 'none';
                startOffset = obtenerOffsetActual();
                startPosX = clientX;
            }

            function moverArrastre(clientX) {
                if (!isDragging) return;
                lastMoveX = clientX;
                var diff = clientX - startPosX;
                track.style.transform = 'translateX(' + (startOffset + diff) + 'px)';
            }

            function finalizarArrastre(clientX) {
                if (!isDragging) return;
                isDragging = false;
                lastMoveX = undefined;

                var diff = clientX - startPosX;
                var ancho = container.offsetWidth;
                var offsetFinal = startOffset + diff;
                var indiceObjetivo = Math.round(-offsetFinal / ancho);
                indiceObjetivo = Math.max(0, Math.min(indiceObjetivo, slides.length - 1));

                isTransitioning = true;
                currentIndex = indiceObjetivo;
                actualizarTransform(true);

                setTimeout(manejarFinTransicion, TRANSITION_DURATION + 50);
                reiniciarAutoTimer();
            }

            cargarFondo();
            cargarImagenes(function(imgs) {
                construirGaleria(imgs);
                if (originalCount > 1) reiniciarAutoTimer();
            });
        })();
    </script>
</body>
</html>
