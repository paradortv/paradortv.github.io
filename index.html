<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Artesanías</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background-color: #2b2b2b;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: calc(14px + 0.8vmin);
            color: #f5e6d3;
        }
        .overlay {
            width: 100%;
            height: 100vh;
            background-color: rgba(20, 15, 10, 0.65);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2vw;
        }
        .main-container {
            display: flex;
            flex-direction: column;
            width: 92%;
            max-width: 1400px;
            height: 100%;
        }
        .gallery-container {
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
            position: relative;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 2px rgba(180, 140, 100, 0.3);
        }
        .gallery-track {
            display: flex;
            height: 100%;
            transition: transform 0.4s ease-out;
            will-change: transform;
        }
        .slide {
            flex: 0 0 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
            background-color: #1a1a1a;
        }
        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .clock-container {
            flex-shrink: 0;
            text-align: center;
            padding: 1vh 0 0.5vh;
            color: #eed9b2;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7), 0 0 10px rgba(180, 130, 70, 0.5);
            letter-spacing: 2px;
        }
        .clock-separator {
            width: 80%;
            max-width: 400px;
            height: 2px;
            background: linear-gradient(to right, transparent, #b89470, transparent);
            margin: 0 auto 0.5vh;
            opacity: 0.7;
        }
        .clock-time {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: bold;
            line-height: 1;
            margin-bottom: 2px;
        }
        .clock-date {
            font-size: clamp(1.4rem, 2.8vw, 2.3rem);
            font-weight: normal;
            opacity: 0.9;
            text-transform: lowercase;
        }
        .clock-date::first-letter { text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="main-container">
            <div class="gallery-container" id="galleryContainer">
                <div class="gallery-track" id="galleryTrack"></div>
            </div>
            <div class="clock-container">
                <div class="clock-separator"></div>
                <div class="clock-time" id="clockTime">--:--:--</div>
                <div class="clock-date" id="clockDate">Cargando fecha...</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var MAX_IMAGES = 20;
            var TRANS_DUR = 400;            // ms
            var DURACION_PRIMERA = 10000;   // 10s
            var DURACION_OTRAS = 3000;      // 3s

            var track = document.getElementById('galleryTrack');
            var body = document.body;
            var clockTimeEl = document.getElementById('clockTime');
            var clockDateEl = document.getElementById('clockDate');

            // Lista de números de imágenes válidas (1,2,3...)
            var imageNumbers = [];
            var totalImages = 0;

            // Control del carrusel
            var currentRealIndex = 0;      // índice en imageNumbers (0..total-1)
            var currentSlideIndex = 0;     // índice en el array extendido (con clones)
            var autoTimer = null;
            var isTransitioning = false;

            // Arrays del DOM
            var slides = [];               // todas las slides (incluye clones)

            var DIAS = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
            var MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

            // ---------- CARGA DEL FONDO ----------
            function cargarFondo() {
                var img = new Image();
                img.onload = function() {
                    body.style.backgroundImage = "url('recursos/fondo.jpeg?v=" + Date.now() + "')";
                };
                img.onerror = function() {
                    body.style.backgroundColor = '#1f1a15';
                };
                img.src = 'recursos/fondo.jpeg?v=' + Date.now();
            }

            // ---------- PRECARGA DE TODAS LAS IMÁGENES ----------
            function precargarTodas(callback) {
                var cargadas = [];
                var fallidas = [];
                var total = MAX_IMAGES;

                function verificar(num) {
                    if (num > total) {
                        callback(cargadas);
                        return;
                    }
                    var url = 'img/' + num + '.jpeg';
                    var img = new Image();
                    img.onload = function() {
                        cargadas.push(num);
                        verificar(num + 1);
                    };
                    img.onerror = function() {
                        // Intentar una segunda vez
                        var img2 = new Image();
                        img2.onload = function() {
                            cargadas.push(num);
                            verificar(num + 1);
                        };
                        img2.onerror = function() {
                            verificar(num + 1);
                        };
                        img2.src = url + '?v=' + Date.now();
                    };
                    img.src = url + '?v=' + Date.now();
                }
                verificar(1);
            }

            // ---------- CONSTRUIR EL CARRUSEL CON CLONES ----------
            function construirCarrusel(nums) {
                imageNumbers = nums;
                totalImages = nums.length;
                track.innerHTML = '';
                slides = [];
                clearTimeout(autoTimer);
                isTransitioning = false;

                if (totalImages === 0) {
                    var div = document.createElement('div');
                    div.className = 'slide';
                    div.style.flex = '0 0 100%';
                    div.style.color = '#eed9b2';
                    div.style.fontSize = '2.5rem';
                    div.textContent = 'Próximamente...';
                    track.appendChild(div);
                    slides = [div];
                    currentRealIndex = 0;
                    currentSlideIndex = 0;
                    return;
                }

                if (totalImages === 1) {
                    var slide = crearSlideConImagen(nums[0]);
                    slide.style.flex = '0 0 100%';
                    track.appendChild(slide);
                    slides = [slide];
                    currentRealIndex = 0;
                    currentSlideIndex = 0;
                    return;
                }

                // Clon del último al principio
                var cloneInicio = crearSlideConImagen(nums[totalImages - 1]);
                track.appendChild(cloneInicio);

                // Slides originales
                for (var i = 0; i < totalImages; i++) {
                    var sl = crearSlideConImagen(nums[i]);
                    track.appendChild(sl);
                }

                // Clon del primero al final
                var cloneFin = crearSlideConImagen(nums[0]);
                track.appendChild(cloneFin);

                slides = Array.prototype.slice.call(track.children);

                // Empezamos en la primera imagen real (índice 1 en el array extendido)
                currentSlideIndex = 1;
                currentRealIndex = 0;
                track.style.transition = 'none';
                track.style.transform = 'translate3d(-' + (currentSlideIndex * 100) + '%, 0, 0)';

                // Iniciar temporizador
                programarSiguiente();
            }

            function crearSlideConImagen(num) {
                var div = document.createElement('div');
                div.className = 'slide';
                var img = document.createElement('img');
                // La imagen ya está precargada en caché, usamos la misma URL base sin ?v=
                img.src = 'img/' + num + '.jpeg';
                img.alt = '';
                img.draggable = false;
                div.appendChild(img);
                return div;
            }

            // ---------- TRANSICIÓN (solo movimiento) ----------
            function moverAdelante() {
                if (isTransitioning || totalImages <= 1) return;
                isTransitioning = true;
                clearTimeout(autoTimer);

                currentSlideIndex++;
                currentRealIndex = (currentRealIndex + 1) % totalImages;

                track.style.transition = 'transform ' + (TRANS_DUR / 1000) + 's ease-out';
                track.style.transform = 'translate3d(-' + (currentSlideIndex * 100) + '%, 0, 0)';

                setTimeout(function() {
                    // Si llegamos a un clon, saltamos al real
                    if (currentSlideIndex === 0) {
                        currentSlideIndex = totalImages;   // último real
                        currentRealIndex = totalImages - 1;
                        track.style.transition = 'none';
                        track.style.transform = 'translate3d(-' + (currentSlideIndex * 100) + '%, 0, 0)';
                    } else if (currentSlideIndex === slides.length - 1) {
                        currentSlideIndex = 1;             // primer real
                        currentRealIndex = 0;
                        track.style.transition = 'none';
                        track.style.transform = 'translate3d(-' + (currentSlideIndex * 100) + '%, 0, 0)';
                    }
                    isTransitioning = false;
                    programarSiguiente();
                }, TRANS_DUR);
            }

            function obtenerDuracion() {
                return (imageNumbers[currentRealIndex] === 1) ? DURACION_PRIMERA : DURACION_OTRAS;
            }

            function programarSiguiente() {
                clearTimeout(autoTimer);
                if (totalImages <= 1) return;
                autoTimer = setTimeout(function() {
                    moverAdelante();
                }, obtenerDuracion());
            }

            // ---------- RELOJ ----------
            function actualizarReloj() {
                var ahora = new Date();
                var h = ahora.getHours();
                var m = ahora.getMinutes();
                var s = ahora.getSeconds();
                clockTimeEl.textContent = (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
                var dia = DIAS[ahora.getDay()];
                var mes = MESES[ahora.getMonth()];
                clockDateEl.textContent = dia + ', ' + ahora.getDate() + ' de ' + mes + ' de ' + ahora.getFullYear();
            }
            actualizarReloj();
            setInterval(actualizarReloj, 1000);

            // ---------- ARRANQUE ----------
            cargarFondo();
            precargarTodas(function(nums) {
                construirCarrusel(nums);
            });
        })();
    </script>
</body>
</html>
